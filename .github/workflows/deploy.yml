name: Deploy to Fly.io

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Maak Postgres database aan
        run: flyctl postgres create --name tv-review-db --region ams --vm-size shared-cpu-1x --volume-size 1 --initial-cluster-size 1 2>&1 || echo "Database bestaat al"

      - name: Koppel database aan app
        run: flyctl postgres attach tv-review-db --app tv-review 2>&1 || echo "Al gekoppeld"

      - name: Deploy
        run: flyctl deploy --remote-only
