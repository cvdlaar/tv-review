version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tv_slides
      POSTGRES_USER: tv_slides_user
      POSTGRES_PASSWORD: tv_slides_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tv_slides_user -d tv_slides"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
